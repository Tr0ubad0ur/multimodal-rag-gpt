qdrant:
  text_collection: "documents"
  image_collection: "images"
  video_collection: "videos"
  text_vector_size: 384
  image_vector_size: 512
  video_vector_size: 512
  score_threshold: 0

data:
  data_folder: "data/test_data"
  chunk_size: 700
  chunk_overlap: 100
  supported_text_extensions: [".txt", ".md"]
  supported_pdf_extensions: [".pdf"]
  supported_image_extensions: [".jpg", ".jpeg", ".png"]
  supported_video_extensions: [".mp4", ".mov", ".avi", ".mkv"]

llm:
  model_name: "Qwen/Qwen2-VL-2B-Instruct"
  available_models:
    - "Qwen/Qwen2-VL-2B-Instruct"
    - "Qwen/Qwen2.5-VL-7B-Instruct"
    - "llava-hf/llava-onevision-qwen2-7b-ov-hf"
    - "openai/gpt-oss-20b"
  max_new_tokens: 512

embeddings:
  default_provider: "sentence-transformers-default"
  video_sample_fps: 1.0
  providers:
    sentence-transformers-default:
      type: "sentence-transformers"
      text_model_name: "all-MiniLM-L6-v2"
      image_model_name: "clip-ViT-B-32"
    sentence-transformers-multilingual:
      type: "sentence-transformers"
      text_model_name: "paraphrase-multilingual-MiniLM-L12-v2"
      image_model_name: "clip-ViT-B-32"

logging:
  log_dir: "logs"
  log_file: "app.log"
  max_bytes: 1048576
  backup_count: 3
